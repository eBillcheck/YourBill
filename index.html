<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Billing - Pro Cloud 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Segoe+UI:wght@400;600;700&display=swap');
        :root { --bg-color: #f4f7f6; --container-bg: #ffffff; --text-header: #2c3e50; --accent: #3498db; }
        [data-theme="dark"] { --bg-color: #1a1a1a; --container-bg: #2d2d2d; --text-header: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; color: var(--text-header); padding: 20px; }
        .header-3d { text-align: center; font-family: 'Montserrat', sans-serif; font-size: clamp(30px, 8vw, 50px); font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        .nav-container { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-blue { background: #3498db; color: white; padding: 10px 15px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 11px; }
        #adminPanel { display: none; }
        .admin-panel { max-width: 1200px; margin: 0 auto 30px auto; background: var(--container-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .admin-panel input, .admin-panel select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: var(--bg-color); color: inherit; }
        .bill-container { max-width: 1200px; margin: 20px auto; background: var(--container-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .month-header { border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px; }
        .month-date-sub { font-size: 12px; color: #7f8c8d; font-weight: bold; margin-top: 2px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        thead tr { background: #2c3e50; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; word-wrap: break-word; }
        .status-pill { padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-paid { background: #d4edda; color: #155724; }
        .status-unpaid { background: #f8d7da; color: #721c24; }
        .status-partial { background: #fff3cd; color: #856404; }
        .sub-text { font-size: 11px; display: block; margin-top: 3px; font-weight: 700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 300px; text-align: center; color: #333; }
        
        /* PDF specific cleaning classes */
        .no-print { display: block; }
        .only-print { display: none; }
    </style>
</head>
<body onload="setupYearMonth()">

    <h1 class="header-3d no-print">Cloud Billing 2026</h1>

    <div class="nav-container no-print">
        <span id="syncIcon" style="color: #27ae60; font-size: 12px; font-weight: bold;">● Cloud Linked</span>
        <div>
            <button class="btn-blue" onclick="toggleTheme()" style="background:#7f8c8d; margin-right:5px;">🌓 Theme</button>
            <a href="Pre.html" class="btn-blue" style="text-decoration:none;">↺ History</a>
        </div>
    </div>

    <div id="adminPanel" class="no-print">
        <div class="admin-panel">
            <select id="inputMonth"></select>
            <input type="date" id="inputDate">
            <input type="text" id="name" placeholder="Full Name" list="nameList" oninput="autoFillDetails(this.value)">
            <datalist id="nameList"></datalist>
            <input type="number" id="oldR" placeholder="Old Reading">
            <input type="number" id="newR" placeholder="New Reading">
            <input type="number" id="balanceCarry" placeholder="Prev. Bill (+/-)">
            <button onclick="addRow()" class="btn-blue" style="background:#27ae60;">+ Add Entry</button>
            <button onclick="downloadPDF()" class="btn-blue" style="background:#e67e22;">📄 Save PDF</button>
            <button onclick="exportData()" class="btn-blue" style="background:#8e44ad;">📥 Backup</button>
            <input type="file" id="importFile" style="display:none;" onchange="importData(event)">
            <button onclick="document.getElementById('importFile').click()" class="btn-blue" style="background:#2c3e50;">📤 Restore</button>
        </div>
    </div>

    <div id="pdfWrapper">
        <div id="tablesContainer"></div>
    </div>

    <div class="no-print" id="loginBtn" onclick="openLogin()" style="text-align:center; margin-top:40px; cursor:pointer; text-decoration:underline; font-size:12px; opacity:0.5;">🔐 Admin Access</div>

    <div id="editModal" class="modal">
        <div class="modal-box">
            <h3>Update Record</h3>
            <p id="editInfo" style="font-size:11px; color:#666;"></p>
            <input type="hidden" id="editId">
            <input type="number" id="editPaid" placeholder="Amount Received" style="width:90%; padding:10px; margin:10px 0; border:1px solid #ddd;">
            <input type="number" id="editBalance" placeholder="Edit Prev. Bill" style="width:90%; padding:10px; margin:10px 0; border:1px solid #ddd;">
            <button onclick="saveEdit()" class="btn-blue" style="width:100%; background:#27ae60; padding:12px;">Sync Changes</button>
            <button onclick="closeModal('editModal')" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer; font-weight:bold;">Cancel</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h3>Admin Identity</h3>
            <input type="text" id="adminId" placeholder="User ID" style="width:90%; padding:10px; margin:5px 0;">
            <input type="password" id="adminPass" placeholder="Password" style="width:90%; padding:10px; margin:5px 0;">
            <button onclick="checkLogin()" class="btn-blue" style="width:100%; margin-top:10px;">Login</button>
            <button onclick="closeModal('loginModal')" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCoEyQf22lNxJLGPttZxjMiiu4OGQhXsZk",
            authDomain: "myelectricitybill-49244.firebaseapp.com",
            databaseURL: "https://myelectricitybill-49244-default-rtdb.firebaseio.com",
            projectId: "myelectricitybill-49244",
            storageBucket: "myelectricitybill-49244.firebasestorage.app",
            messagingSenderId: "343702698525",
            appId: "1:343702698525:web:2c46f3b5597bde55b4a4f4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false, globalData = [];

        db.ref('billingData').on('value', (snap) => {
            globalData = snap.val() ? Object.values(snap.val()) : [];
            displayAllTables(globalData);
            updateNameSuggestions(globalData);
        });

        function setupYearMonth() {
            const select = document.getElementById('inputMonth');
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            [2026, 2027].forEach(y => months.forEach(m => {
                let opt = document.createElement('option'); opt.value = `${m} ${y}`; opt.innerHTML = `${m} ${y}`; select.appendChild(opt);
            }));
        }

        function displayAllTables(data) {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '';
            const monthsOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const sortedMonths = [...new Set(data.map(i => i.month))].sort((a,b) => {
                const [m1, y1] = a.split(" "), [m2, y2] = b.split(" ");
                return y2 !== y1 ? y2 - y1 : monthsOrder.indexOf(m2) - monthsOrder.indexOf(m1);
            });

            sortedMonths.forEach(month => {
                const monthData = data.filter(i => i.month === month);
                const tableDate = monthData[0].date ? monthData[0].date.split('-').reverse().join('/') : "";

                let html = `<div class="bill-container">
                    <div class="month-header">
                        <h2 style="color:var(--accent); margin:0; line-height:1;">${month}</h2>
                        <div class="month-date-sub">${tableDate}</div>
                    </div>
                    <div style="overflow-x:auto;"><table><thead><tr>
                        <th style="width:15%">Name</th><th style="width:15%">Reading</th><th style="width:10%">Units</th><th style="width:12%">Current Bill</th><th style="width:12%">Prev. Bill</th><th style="width:12%">Total Bill</th><th style="width:14%">Received</th><th style="width:10%">Status</th>
                        ${isAdmin ? '<th class="no-print" style="width:100px;">Action</th>' : ''}
                    </tr></thead><tbody>`;

                monthData.forEach(item => {
                    const units = item.newR - item.oldR, current = units * 10, prev = item.bal || 0, total = current + prev, received = item.paid || 0, diff = total - received;
                    let extra = diff > 0 ? `<span class="sub-text" style="color:#e74c3c;">Rem: ₹${diff}</span>` : (diff < 0 ? `<span class="sub-text" style="color:#2980b9;">Adv: ₹${Math.abs(diff)}</span>` : `<span class="sub-text" style="color:#7f8c8d;">Settled</span>`);
                    
                    html += `<tr>
                        <td><b>${item.name}</b></td>
                        <td>${item.oldR}→${item.newR}</td>
                        <td>${units}</td>
                        <td style="color:#3498db; font-weight:bold;">₹${current}</td>
                        <td style="color:${prev >= 0 ? '#e67e22' : '#27ae60'}; font-weight:600;">${prev >= 0 ? '+' : ''}${prev}</td>
                        <td style="font-weight:bold; background:rgba(0,0,0,0.03);">₹${total}</td>
                        <td><b style="color:#27ae60;">₹${received}</b>${extra}</td>
                        <td><span class="status-pill ${item.status==='PAID'?'status-paid':(item.status==='PARTIAL'?'status-partial':'status-unpaid')}">${item.status}</span></td>
                        ${isAdmin ? `<td class="no-print"><button onclick="openEdit(${item.id})" style="background:#f39c12; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:10px;">Edit</button> <button onclick="deleteRow(${item.id})" style="background:#ff4757; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:10px;">Del</button></td>` : ''}
                    </tr>`;
                });
                container.innerHTML += html + `</tbody></table></div></div>`;
            });
        }

        function downloadPDF() {
            // Target the wrapper that holds the tables
            const element = document.getElementById('pdfWrapper');
            
            // Temporary hide everything with 'no-print' class before capturing
            const noPrintElements = document.querySelectorAll('.no-print');
            noPrintElements.forEach(el => el.style.display = 'none');

            const opt = {
                margin: [10, 5, 10, 5],
                filename: 'Electricity_Bills_2026.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Restore visibility for screen viewing after PDF is generated
                noPrintElements.forEach(el => {
                    if(el.tagName === 'TH' || el.tagName === 'TD') el.style.display = 'table-cell';
                    else if(el.id === 'adminPanel' && isAdmin) el.style.display = 'block';
                    else if(el.className.includes('nav-container')) el.style.display = 'flex';
                    else el.style.display = 'block';
                });
            });
        }

        // Rest of the logic remains the same
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm(`Restore ${data.length} records?`)) {
                        data.forEach(item => db.ref('billingData/' + item.id).set(item));
                        alert("Done!");
                    }
                } catch (err) { alert("Format Error!"); }
            };
            reader.readAsText(file);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(globalData)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Cloud_Backup.json`; a.click();
        }

        function checkLogin() {
            if(btoa(document.getElementById('adminId').value) === "dmlzaWJsZWVnbw==" && btoa(document.getElementById('adminPass').value) === "bG9ja2Rvd24yMDE5") {
                isAdmin = true; document.getElementById('adminPanel').style.display = 'block'; document.getElementById('loginBtn').style.display = 'none'; closeModal('loginModal'); displayAllTables(globalData);
            } else { alert("Failed!"); }
        }

        function addRow() {
            const entry = { id: Date.now(), month: document.getElementById('inputMonth').value, date: document.getElementById('inputDate').value, name: document.getElementById('name').value, oldR: parseInt(document.getElementById('oldR').value) || 0, newR: parseInt(document.getElementById('newR').value) || 0, bal: parseInt(document.getElementById('balanceCarry').value) || 0, paid: 0, status: "NOT PAID" };
            if(!entry.name) return alert("Name required!");
            db.ref('billingData/' + entry.id).set(entry);
            document.getElementById('name').value = ''; document.getElementById('newR').value = ''; document.getElementById('balanceCarry').value = '';
        }

        function saveEdit() {
            const id = document.getElementById('editId').value, paid = parseInt(document.getElementById('editPaid').value) || 0, bal = parseInt(document.getElementById('editBalance').value) || 0;
            const item = globalData.find(i => i.id == id), total = ((item.newR - item.oldR) * 10) + bal;
            db.ref('billingData/' + id).update({ paid, bal, status: (paid >= total) ? "PAID" : (paid > 0 ? "PARTIAL" : "NOT PAID") });
            closeModal('editModal');
        }

        function deleteRow(id) { if(confirm("Delete record?")) db.ref('billingData/' + id).remove(); }
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openEdit(id) {
            const item = globalData.find(i => i.id == id);
            document.getElementById('editId').value = id; document.getElementById('editPaid').value = item.paid; document.getElementById('editBalance').value = item.bal; document.getElementById('editInfo').innerText = `Record: ${item.name}`; document.getElementById('editModal').style.display = 'flex';
        }
        function toggleTheme() { document.body.getAttribute('data-theme')==='dark'?document.body.removeAttribute('data-theme'):document.body.setAttribute('data-theme','dark'); }
        function autoFillDetails(val) {
            const records = globalData.filter(i => i.name === val).sort((a,b) => b.id - a.id);
            if(records.length > 0) {
                document.getElementById('oldR').value = records[0].newR;
                document.getElementById('balanceCarry').value = ((records[0].newR - records[0].oldR) * 10) + records[0].bal - records[0].paid;
            }
        }
        function updateNameSuggestions(data) {
            const list = document.getElementById('nameList'); list.innerHTML = '';
            [...new Set(data.map(i => i.name))].forEach(n => { let o = document.createElement('option'); o.value = n; list.appendChild(o); });
        }
    </script>
</body>
</html>
