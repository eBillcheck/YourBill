<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Billing - Pro Cloud 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Segoe+UI:wght@400;600;700&display=swap');
        :root { --bg-color: #f4f7f6; --container-bg: #ffffff; --text-header: #2c3e50; --accent: #3498db; }
        [data-theme="dark"] { --bg-color: #1a1a1a; --container-bg: #2d2d2d; --text-header: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; color: var(--text-header); padding: 20px; }
        .header-3d { text-align: center; font-family: 'Montserrat', sans-serif; font-size: clamp(30px, 8vw, 60px); font-weight: 900; text-transform: uppercase; animation: float 4s infinite; margin-bottom: 20px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .nav-container { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-blue { background: #3498db; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; font-size: 12px; }
        #adminPanel { display: none; }
        .admin-panel { max-width: 1200px; margin: 0 auto 30px auto; background: var(--container-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .admin-panel input, .admin-panel select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; background: var(--bg-color); color: inherit; }
        .bill-container { max-width: 1200px; margin: 0 auto 40px auto; background: var(--container-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); page-break-inside: avoid; }
        .month-header { display: flex; justify-content: space-between; align-items: flex-end; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px; }
        .month-title { color: var(--accent); font-family: 'Montserrat', sans-serif; margin: 0; }
        .bill-date-label { font-size: 14px; font-weight: 600; color: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        thead tr { background: #2c3e50; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; font-size: 13px; }
        .status-pill { padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; display: inline-block; }
        .status-paid { background: #d4edda; color: #155724; }
        .status-unpaid { background: #f8d7da; color: #721c24; }
        .status-partial { background: #fff3cd; color: #856404; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 10000; }
        .modal-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; color: #333; }
        .modal-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .edit-btn, .del-btn { padding: 5px 10px; border-radius: 4px; cursor: pointer; border: none; color: white; }
        .edit-btn { background: #f39c12; } .del-btn { background: #ff4757; }
        .footer-link { text-align: center; margin-top: 30px; font-size: 13px; opacity: 0.6; cursor: pointer; text-decoration: underline; }
        .theme-toggle { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 50%; cursor: pointer; background: var(--accent); color: white; border: none; z-index: 1001; }
    </style>
</head>
<body onload="setupYearMonth()">

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <h1 class="header-3d">Billing Dashboard</h1>

    <div class="nav-container">
        <span id="syncIcon" style="color: #27ae60; font-size: 12px; font-weight: bold;">● Cloud Live</span>
        <a href="Pre.html" class="btn-blue">↺ History Records</a>
    </div>

    <div id="adminPanel">
        <div class="admin-panel">
            <select id="inputMonth"></select>
            <input type="date" id="inputDate">
            <input type="text" id="name" placeholder="Name" list="nameList" oninput="autoFillDetails(this.value)">
            <datalist id="nameList"></datalist>
            <input type="number" id="oldR" placeholder="Old Reading">
            <input type="number" id="newR" placeholder="New Reading">
            <input type="number" id="balanceCarry" placeholder="Prev. Bal (+/-)">
            <button onclick="addRow()" class="btn-blue" style="background:#27ae60;">Add Entry</button>
            <button onclick="downloadPDF()" class="btn-blue" style="background:#e67e22;">📄 Download PDF</button>
            <button onclick="exportData()" class="btn-blue" style="background:#8e44ad;">📥 Backup</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button onclick="document.getElementById('importFile').click()" class="btn-blue" style="background:#2c3e50;">📤 Import</button>
        </div>
    </div>

    <div id="pdfContent">
        <div id="tablesContainer"></div>
    </div>

    <div class="footer-link" id="loginBtn" onclick="openLogin()">🔐 Admin Login</div>

    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h3>Admin Access</h3>
            <input type="text" id="adminId" placeholder="User ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="checkLogin()" class="btn-blue" style="width:100%">Verify</button>
            <button onclick="closeModal('loginModal')" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-box">
            <h3>Update Payments</h3>
            <p id="editInfo" style="font-size:12px; color:#666;"></p>
            <input type="hidden" id="editId">
            <input type="number" id="editPaid" placeholder="Received Amount">
            <input type="number" id="editBalance" placeholder="Balance Carry">
            <button onclick="saveEdit()" class="btn-blue" style="width:100%; background:#27ae60;">Save & Sync</button>
            <button onclick="closeModal('editModal')" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCoEyQf22lNxJLGPttZxjMiiu4OGQhXsZk",
            authDomain: "myelectricitybill-49244.firebaseapp.com",
            databaseURL: "https://myelectricitybill-49244-default-rtdb.firebaseio.com",
            projectId: "myelectricitybill-49244",
            storageBucket: "myelectricitybill-49244.firebasestorage.app",
            messagingSenderId: "343702698525",
            appId: "1:343702698525:web:2c46f3b5597bde55b4a4f4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false;
        let globalData = [];

        db.ref('billingData').on('value', (snapshot) => {
            const data = snapshot.val();
            globalData = data ? Object.values(data) : [];
            displayAllTables(globalData);
            updateNameSuggestions(globalData);
        });

        function setupYearMonth() {
            const select = document.getElementById('inputMonth');
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            [2026, 2027, 2028].forEach(y => months.forEach(m => {
                let opt = document.createElement('option');
                opt.value = `${m} ${y}`; opt.innerHTML = `${m} ${y}`;
                select.appendChild(opt);
            }));
        }

        function displayAllTables(data) {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '';
            if(!data.length) { container.innerHTML = '<p style="text-align:center; opacity:0.5;">No Data Found.</p>'; return; }

            const monthsOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const sortedMonths = [...new Set(data.map(i => i.month))].sort((a,b) => {
                const [m1, y1] = a.split(" "), [m2, y2] = b.split(" ");
                if (y2 !== y1) return y2 - y1;
                return monthsOrder.indexOf(m2) - monthsOrder.indexOf(m1);
            });

            sortedMonths.forEach(month => {
                const monthData = data.filter(i => i.month === month);
                const rawDate = monthData[0].date || "";
                const formattedDate = rawDate ? rawDate.split('-').reverse().join('/') : "N/A";

                let html = `<div class="bill-container">
                    <div class="month-header">
                        <h2 class="month-title">${month}</h2>
                        <span class="bill-date-label">Bill Date: ${formattedDate}</span>
                    </div>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th><th>Reading</th><th>Units</th><th>Cost</th><th>Prev. Bal</th><th>Total</th><th>Status</th>
                                    ${isAdmin ? '<th class="no-print">Action</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>`;

                monthData.forEach(item => {
                    const units = item.newR - item.oldR;
                    const total = (units * 10) + item.bal;
                    html += `<tr>
                        <td><b>${item.name}</b></td>
                        <td>${item.oldR}→${item.newR}</td>
                        <td>${units}</td>
                        <td style="color:#2980b9; font-weight:bold;">₹${units*10}</td>
                        <td style="color:${item.bal>=0?'#e74c3c':'#27ae60'}">${item.bal>=0?'+':''}${item.bal}</td>
                        <td style="font-weight:bold; background:rgba(0,0,0,0.02);">₹${total}</td>
                        <td><span class="status-pill ${item.status==='PAID'?'status-paid':(item.status==='PARTIAL'?'status-partial':'status-unpaid')}">${item.status}</span></td>
                        ${isAdmin ? `<td class="no-print"><button class="edit-btn" onclick="openEdit(${item.id})">Edit</button> <button class="del-btn" onclick="deleteRow(${item.id})">Del</button></td>` : ''}
                    </tr>`;
                });
                container.innerHTML += html + `</tbody></table></div></div>`;
            });
        }

        // --- NEW PDF FUNCTION ---
        function downloadPDF() {
            const element = document.getElementById('pdfContent');
            const opt = {
                margin: 10,
                filename: 'Electricity_Bills_2026.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Temporary hide action columns for clean PDF
            const actionCols = document.querySelectorAll('.no-print');
            actionCols.forEach(el => el.style.display = 'none');

            html2pdf().set(opt).from(element).save().then(() => {
                // Restore action columns after saving
                actionCols.forEach(el => el.style.display = '');
            });
        }

        function checkLogin() {
            const u = document.getElementById('adminId').value;
            const p = document.getElementById('adminPass').value;
            if(btoa(u) === "dmlzaWJsZWVnbw==" && btoa(p) === "bG9ja2Rvd24yMDE5") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                closeModal('loginModal');
                displayAllTables(globalData);
            } else { alert("Wrong Details!"); }
        }

        function addRow() {
            if(!isAdmin) return;
            const entry = { id: Date.now(), month: document.getElementById('inputMonth').value, date: document.getElementById('inputDate').value, name: document.getElementById('name').value, oldR: parseInt(document.getElementById('oldR').value) || 0, newR: parseInt(document.getElementById('newR').value) || 0, bal: parseInt(document.getElementById('balanceCarry').value) || 0, paid: 0, status: "NOT PAID" };
            if(!entry.name || !entry.date) return alert("Fill Name/Date!");
            db.ref('billingData/' + entry.id).set(entry);
            document.getElementById('name').value = ''; document.getElementById('newR').value = ''; document.getElementById('balanceCarry').value = '';
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(globalData)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Cloud_Backup.json`; a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        imported.forEach(item => { db.ref('billingData/' + (item.id || Date.now() + Math.random())).update(item); });
                        alert("Imported!");
                    }
                } catch (err) { alert("Error!"); }
            };
            reader.readAsText(file);
        }

        function saveEdit() {
            const id = document.getElementById('editId').value;
            const paid = parseInt(document.getElementById('editPaid').value) || 0;
            const bal = parseInt(document.getElementById('editBalance').value) || 0;
            const item = globalData.find(i => i.id == id);
            const total = ((item.newR - item.oldR) * 10) + bal;
            db.ref('billingData/' + id).update({ paid, bal, status: (paid >= total) ? "PAID" : (paid > 0 ? "PARTIAL" : "NOT PAID") });
            closeModal('editModal');
        }

        function deleteRow(id) { if(confirm("Delete?")) db.ref('billingData/' + id).remove(); }

        function autoFillDetails(val) {
            const records = globalData.filter(i => i.name === val).sort((a,b) => b.id - a.id);
            if(records.length > 0) {
                document.getElementById('oldR').value = records[0].newR;
                document.getElementById('balanceCarry').value = ((records[0].newR - records[0].oldR)*10) + records[0].bal - records[0].paid;
            }
        }

        function updateNameSuggestions(data) {
            const list = document.getElementById('nameList'); list.innerHTML = '';
            [...new Set(data.map(i => i.name))].forEach(n => { let o = document.createElement('option'); o.value = n; list.appendChild(o); });
        }
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openEdit(id) {
            const item = globalData.find(i => i.id == id);
            document.getElementById('editId').value = id; document.getElementById('editPaid').value = item.paid; document.getElementById('editBalance').value = item.bal; document.getElementById('editInfo').innerText = `Editing: ${item.name}`; document.getElementById('editModal').style.display = 'flex';
        }
        function toggleTheme() { document.body.getAttribute('data-theme')==='dark'?document.body.removeAttribute('data-theme'):document.body.setAttribute('data-theme','dark'); }
    </script>
</body>
</html>
